<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK PATIL AI Engine</title>
    <style>
        /* प्रीमियम और वाइब्रेंट डार्क बैकग्राउंड */
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            text-align: center; 
            background: #06060c;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* लिक्विड ऑरोरा नियॉन ग्लो इफेक्ट्स */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(130px);
            z-index: 0;
            animation: pulseGlowEffect 6s infinite alternate ease-in-out;
        }
        body::before {
            background: #ff007f;
            top: 5%; left: 5%;
        }
        body::after {
            background: #00f2fe;
            bottom: 5%; right: 5%;
            animation-delay: -3s;
        }

        @keyframes pulseGlowEffect {
            0% { transform: scale(1) translate(0px, 0px); }
            100% { transform: scale(1.3) translate(20px, 20px); }
        }

        /* 3D ग्लास-मॉर्फिज्म कार्ड */
        .container { 
            max-width: 400px; 
            width: 100%;
            background: rgba(15, 15, 25, 0.75); 
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            padding: 45px 30px; 
            border-radius: 28px; 
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1); 
            animation: smoothEntrance 1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            color: white;
            box-sizing: border-box;
        }

        @keyframes smoothEntrance {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* आपका नया ब्रांड नेम */
        h2 { 
            font-size: 36px;
            font-weight: 900; 
            margin: 0 0 8px 0; 
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00f2fe, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }
        
        p { color: #a4b0be; font-size: 14px; margin-bottom: 35px; }

        /* कैमरा कंटेनर */
        #cameraContainer {
            display: none;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 25px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
            position: relative;
            animation: cameraZoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }

        @keyframes cameraZoomIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        video { width: 100%; height: auto; display: block; transform: scaleX(-1); }

        /* लेज़र स्कैनिंग लाइन */
        .scanner-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(to right, transparent, #00f2fe, transparent);
            box-shadow: 0 0 15px #00f2fe;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        
        /* प्रीमियम गेमिंग/एआई बटन्स */
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            color: white; border: none; padding: 18px 20px; font-size: 16px; font-weight: 700;
            border-radius: 16px; cursor: pointer; width: 100%; margin-bottom: 18px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Take A Selfie बटन */
        .btn-selfie {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.3);
        }

        /* लाइव क्लिक शटर बटन */
        .btn-capture {
            background: linear-gradient(135deg, #ff007f, #ff7675);
            display: none;
            animation: pulseGlow 1.5s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
            100% { transform: scale(1.04); box-shadow: 0 0 30px rgba(255, 0, 127, 0.8); }
        }

        /* Find Photo बटन */
        .btn-find {
            background: linear-gradient(135deg, #7000ff, #aa00ff);
            box-shadow: 0 4px 20px rgba(112, 0, 255, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            filter: brightness(1.15);
        }

        .btn:active { transform: translateY(1px); }
        
        /* फोटो रिपल्स ग्रिड */
        .gallery { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; 
        }

        .gallery img { 
            width: 100%; height: 130px; object-fit: cover;
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            animation: photoReveal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes photoReveal {
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        #statusMessage { 
            margin-top: 20px; font-weight: 600; font-size: 14px;
            color: #00f2fe; text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ब्रांड नेम बदला गया -->
    <h2>HK PATIL</h2>
    <p>AI-Powered Instant Photo Delivery System</p>
    
    <!-- लाइव कैमरा स्क्रीन -->
    <div id="cameraContainer">
        <div class="scanner-line"></div>
        <video id="video" autoplay playsinline></video>
    </div>

    <!-- बटन्स के नाम बदले गए -->
    <button class="btn btn-selfie" id="startBtn" onclick="startCamera()">Take A Selfie 📸</button>
    <button class="btn btn-capture" id="captureBtn" onclick="takeSnapshot()">Click Photo 🎯</button>
    <button class="btn btn-find" onclick="getPhotos()">Find Photo 🔍</button>

    <div id="statusMessage"></div>
    <div id="gallery" class="gallery"></div>
</div>

<script>
    let streamInstance = null;
    let blobData = null;

    async function startCamera() {
        const video = document.getElementById('video');
        const cameraContainer = document.getElementById('cameraContainer');
        const startBtn = document.getElementById('startBtn');
        const captureBtn = document.getElementById('captureBtn');

        try {
            streamInstance = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, audio: false 
            });
            video.srcObject = streamInstance;
            cameraContainer.style.display = "block";
            startBtn.style.display = "none";
            captureBtn.style.display = "flex";
            document.getElementById('statusMessage').innerHTML = "";
        } catch (err) {
            alert("Camera access denied!");
        }
    }

    function takeSnapshot() {
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        if(streamInstance) {
            streamInstance.getTracks().forEach(track => track.stop());
        }

        canvas.toBlob(function(blob) {
            blobData = blob;
            document.getElementById('cameraContainer').style.display = "none";
            document.getElementById('captureBtn').style.display = "none";
            const startBtn = document.getElementById('startBtn');
            startBtn.style.display = "flex";
            startBtn.innerHTML = "Selfie Verified! ✅";
            startBtn.style.background = "linear-gradient(135deg, #00b894, #00cec9)";
            startBtn.style.boxShadow = "0 0 25px rgba(0, 184, 148, 0.6)";
        }, 'image/jpeg');
    }

    async function getPhotos() {
        const gallery = document.getElementById('gallery');
        const statusMessage = document.getElementById('statusMessage');
        gallery.innerHTML = ""; statusMessage.innerHTML = "";

        if (!blobData) {
            alert("Please take a selfie first!");
            return;
        }

        statusMessage.innerHTML = "Matching your face with database... ⏱️";

        const formData = new FormData();
        formData.append("selfie", blobData, "selfie.jpg");

        try {
            const response = await fetch('http://127.0.0.1:5000/find_my_photos', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) throw new Error();
            const data = await response.json();
            statusMessage.innerHTML = ""; 

            if (data.matched_photos && data.matched_photos.length > 0) {
                data.matched_photos.forEach((photoName, index) => {
                    const img = document.createElement('img');
                    img.src = `http://127.0.0.1:5000/wedding_photos/${photoName}`;
                    img.style.animationDelay = `${index * 0.1}s`;
                    gallery.appendChild(img);
                });
            } else {
                statusMessage.innerHTML = "No photos found! 😢";
            }
        } catch (error) {
            statusMessage.innerHTML = "AI Engine Connection Timeout.";
        }
    }
</script>
</body>
</html>
